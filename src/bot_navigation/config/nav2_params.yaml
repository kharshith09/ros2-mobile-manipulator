amcl:
  ros__parameters:
    use_sim_time: true
    
    max_particles: 500
    min_particles: 200
    update_min_d: 0.3 #(update every 30cm of movement)
    update_min_a: 0.2 #(update every 0.2 rad of rotation)
    laser_model_type: "likelihood_field"
    scan_topic: /scan
    transform_tolerance: 2.0


bt_navigator:
  ros__parameters:
    use_sim_time: true
    default_nav_to_pose_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_only_if_path_becomes_invalid.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_only_if_path_becomes_invalid.xml"


planner_server:
  ros__parameters:
    use_sim_time: true
    plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: true


controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: true
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.26
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_rotate_to_heading: false
      max_angular_accel: 3.2
      use_collision_detection: true
      max_robot_pose_search_dist: 10.0


global_costmap:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    resolution: 0.05
    robot_radius: 0.22
    update_frequency: 2.0
    publish_frequency: 1.0
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

  

local_costmap:
  ros__parameters:
    use_sim_time: true
    global_frame: odom
    robot_base_frame: base_footprint
    resolution: 0.05
    robot_radius: 0.22
    width: 3.0
    height: 3.0
    update_frequency: 5.0
    publish_frequency: 2.0
    plugins: ["obstacle_layer", "inflation_layer"]


map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: /home/harshith/ros2_ws2/src/bot_navigation/maps/colorful_house_map.yaml
    topic_name: map

lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - map_server
      - amcl
      - planner_server
      - controller_server
      - bt_navigator
